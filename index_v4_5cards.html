    select{min-width:155px}
    button{cursor:pointer;background:var(--accent);color:#fff;border-color:var(--accent)}

    .sub{font-size:11px;color:var(--muted);line-height:1.3;min-height:28px}

    .count.new{background:var(--soft-red);color:var(--red);border-color:#fecdca}
    .articleBox{border-top:1px solid var(--line);padding-top:7px;margin-top:7px}
    .articleBox details{border:0;margin:0;padding:0}
    .articleBox summary{list-style:none;cursor:pointer}
    .articleBox summary::-webkit-details-marker{display:none}
    .articleTitle{font-size:12px;line-height:1.35;font-weight:700;color:#1d2939;margin:0 0 3px}
    .articleMeta{font-size:10px;color:var(--muted);display:flex;gap:5px;flex-wrap:wrap;align-items:center}

    .articleBody p{font-size:12px;line-height:1.45;margin:6px 0}
    .label{font-weight:700;color:#344054}
    .tagNew{display:inline-block;background:var(--soft-red);color:var(--red);border-radius:6px;padding:2px 5px;font-size:9px;font-weight:700;margin-right:3px}

    .watch details{border-top:1px solid var(--line);margin-top:8px;padding-top:7px}
    .watch summary{cursor:pointer;color:var(--accent);font-weight:700;font-size:12px}
    .watch p{font-size:12px;line-height:1.45}
    .editor{display:none;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    textarea{width:100%;height:420px;font-family:Consolas,monospace;font-size:12px}
    .empty{grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)}

    @media(max-width:1250px){.grid,.changes{grid-template-columns:repeat(3,1fr)}}

</head>

    <textarea id="jsonBox"></textarea>
    <div style="margin-top:10px">
      <button onclick="saveData()">저장</button>
      <button class="secondary" onclick="toggleEditor()">닫기</button>
    </div>
  </section>

  <section id="cards" class="grid"></section>
</main>

    id:"2026-07-03-0800",
    label:"2026.07.03 08:00 KST",
    items:[
      {
        agenda:"ADNOC East Coast LNG", order:3,
        fullName:"Fujairah 4 mtpa LNG / East Coast Export Option",
        region:"UAE", status:"Design Competition Watch", priority:5, owner:"ADNOC",
        ownerWatch:"Fujairah LNG design competition, Ruwais LNG와 별도 관리.",
        competitorWatch:"Technip Energies, JGC, NMDC, McDermott 등 LNG 강자.",
        implication:"초기 design competition 진입 여부가 핵심.",
        articles:[
          {title:"Adnoc seeks bids for surprise new LNG facility bypassing Strait of Hormuz",date:"2026.06",source:"Upstream / NewVision digest",url:"https://newvision.io/industry-digest/adnoc-seeks-bids-for-surprise-new-lng-facility-bypassing-strait-of-hormuz",summary:"ADNOC이 Fujairah에 4 mtpa LNG export facility를 검토하며 bid/design competition을 시작했다는 보도.",insight:"East Coast LNG는 기존 Ruwais LNG와 별도 신규 기회로 관리해야 한다.",isNew:true,isImportant:true}
        ]
      },
      {
        agenda:"India ACME", order:5,
        fullName:"ACME-IHI Gopalpur Green Ammonia",
        region:"India", status:"Funding / EPC Watch", priority:4, owner:"ACME / IHI",
        ownerWatch:"일본 CfD와 LTDA, EPC package split 추적.",
        competitorWatch:"L&T, 일본 기술사, electrolyzer 공급사.",
        implication:"bankability 개선으로 EPC 구체화 가능성 상승.",
        articles:[
          {title:"ACME-IHI JV secures Japan’s CfD support for Odisha green ammonia project",date:"2026.06.30",source:"ET EnergyWorld",url:"https://energy.economictimes.indiatimes.com/news/renewable/acme-ihi-jv-secures-japans-cfd-support-for-odisha-green-ammonia-project/132091710",summary:"ACME-IHI Gopalpur green ammonia 프로젝트가 일본 정부 CfD 지원을 확보했다는 보도.",insight:"장기 가격지원은 financing risk를 낮춰 EPC 발주 가능성을 높인다.",isNew:true,isImportant:true}
        ]

];

let briefings = JSON.parse(localStorage.getItem("ena_bd_briefings_v5") || "null") || defaultBriefings;
let selectedId = localStorage.getItem("ena_bd_selected_briefing_v5") || briefings[0].id;

function validUrl(u){ return u && /^https?:\/\//i.test(u); }
function linkHtml(u){ return validUrl(u) ? `<a class="linkBtn" href="${u}" target="_blank" rel="noopener noreferrer">원문</a>` : `<span class="linkBtn" style="color:#667085;border-color:#d0d5dd;background:#f8fafc;cursor:not-allowed">링크없음</span>`; }
function stars(n){ return "★".repeat(n)+"☆".repeat(5-n); }
function currentBriefing(){ return briefings.find(b=>b.id===selectedId) || briefings[0]; }

function fillDateSelect(){
  const sel=document.getElementById("dateSelect");
  sel.innerHTML = briefings.map(b=>`<option value="${b.id}">${b.label}</option>`).join("");
  if(!briefings.find(b=>b.id===selectedId)) selectedId=briefings[0].id;
  sel.value=selectedId;
}

function fillRegionFilter(){
  const items=currentBriefing().items;
  const regions=[...new Set(items.map(x=>x.region))].sort();
  const sel=document.getElementById("region");
  const current=sel.value;
  sel.innerHTML='<option value="">전체 지역</option>'+regions.map(r=>`<option value="${r}">${r}</option>`).join("");
  sel.value=regions.includes(current)?current:"";
}

function renderHeader(){
  const b=currentBriefing();
  document.getElementById("selectedLabel").textContent = `Selected Briefing: ${b.label}`;
  const now=new Date();
  document.getElementById("lastUpdated").textContent = `Viewed: ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
}

function renderChanges(){
  const changes=currentBriefing().items.flatMap(x=>(x.articles||[])
    .filter(a=>a.isNew)
    .map(a=>({agenda:x.agenda,title:a.title,insight:a.insight,url:a.url}))).slice(0,5);
  document.getElementById("changes").innerHTML = changes.length ? changes.map(c=>`
    <div class="change"><b>${c.agenda}</b>${c.title}<br><span style="color:#667085">${c.insight}</span><br>${linkHtml(c.url)}</div>
  `).join("") : '<div class="change"><b>변경사항 없음</b>선택 날짜에 NEW 표시된 기사/안건이 없습니다.</div>';
}

function render(){
  const b=currentBriefing();
  const items=[...b.items].sort((a,b)=>(a.order||99)-(b.order||99));
  const q=document.getElementById("q").value.toLowerCase();
  const r=document.getElementById("region").value;
  const p=document.getElementById("priority").value;
  const filtered=items.filter(x=>{
    const text=JSON.stringify(x).toLowerCase();
    return (!q||text.includes(q)) && (!r||x.region===r) && (!p||String(x.priority)===p);
  });
  renderHeader();
  renderChanges();
  document.getElementById("cards").innerHTML = filtered.length ? filtered.map(x=>{
    const articles=x.articles||[];
    const newCount=articles.filter(a=>a.isNew).length;
    return `
    <article class="card">
      <h2>${x.agenda}</h2>
      <div class="sub">${x.fullName}</div>
      <div class="pills">
        <span class="pill">${x.region}</span>
        <span class="pill">${x.status}</span>
        <span class="pill priority${x.priority}">${stars(x.priority)}</span>
      </div>
      <div class="counts">
        <span class="count">기사 ${articles.length}건</span>
        <span class="count new">NEW ${newCount}건</span>
      </div>
      ${articles.slice(0,4).map(a=>`
        <div class="articleBox">
          <details>
            <summary>
              <div class="articleTitle">${a.isNew?'<span class="tagNew">NEW</span>':''}${a.isImportant?'<span class="tagImp">중요</span>':''}${a.title}</div>
              <div class="articleMeta"><span>${a.date}</span><span>·</span><span>${a.source}</span>${linkHtml(a.url)}</div>
            </summary>
            <div class="articleBody">
              <p><span class="label">기사요약:</span> ${a.summary}</p>
              <p><span class="label">인사이트:</span> ${a.insight}</p>
            </div>
          </details>
        </div>
      `).join("")}
      <div class="watch">
        <details>
          <summary>Owner Watch</summary>
          <p>${x.ownerWatch}</p>
        </details>
        <details>
          <summary>Competitor Watch</summary>
          <p>${x.competitorWatch}</p>
        </details>
        <details>
          <summary>E&A 시사점</summary>
          <p>${x.implication}</p>
        </details>
      </div>
    </article>`
  }).join("") : `<div class="empty">검색 결과가 없습니다.</div>`;
  document.getElementById("jsonBox").value=JSON.stringify(briefings,null,2);
}

function toggleEditor(){
  const e=document.getElementById("editor");
  e.style.display=e.style.display==="block"?"none":"block";
  document.getElementById("jsonBox").value=JSON.stringify(briefings,null,2);
}
function saveData(){
  try{
    briefings=JSON.parse(document.getElementById("jsonBox").value);
    localStorage.setItem("ena_bd_briefings_v5",JSON.stringify(briefings));
    fillDateSelect(); fillRegionFilter(); render(); alert("저장했습니다.");
  }catch(e){ alert("JSON 형식 오류: "+e.message); }
}
function exportData(){
  const blob=new Blob([JSON.stringify(briefings,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="ena_bd_briefings_backup.json"; a.click();
}
function resetData(){
  if(confirm("초기 데이터로 되돌릴까요?")){
    briefings=defaultBriefings;
    selectedId=briefings[0].id;
    localStorage.setItem("ena_bd_briefings_v5",JSON.stringify(briefings));
    localStorage.setItem("ena_bd_selected_briefing_v5",selectedId);
    fillDateSelect(); fillRegionFilter(); render();
  }
}

document.getElementById("dateSelect").addEventListener("change",e=>{
  selectedId=e.target.value;
  localStorage.setItem("ena_bd_selected_briefing_v5",selectedId);
  fillRegionFilter(); render();
});
document.getElementById("q").addEventListener("input",render);
document.getElementById("region").addEventListener("change",render);
document.getElementById("priority").addEventListener("change",render);

fillDateSelect();
fillRegionFilter();
render();
setInterval(renderHeader,30000);
</script>
</body>
</html>
