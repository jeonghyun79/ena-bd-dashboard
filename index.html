<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>E&A BD Daily Dashboard</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#17212b;--muted:#667085;--line:#d9e2ec;--accent:#174a7c;--navy:#102a43;--red:#b42318;--amber:#b54708;--soft-blue:#eef5fb;--soft-red:#fee4e2;--soft-amber:#fef0c7;--soft-green:#dcfae6}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink)}header{background:var(--navy);color:#fff;padding:20px 26px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}header h1{margin:0;font-size:24px}.timebar{margin-top:8px;color:#d9e2ec;font-size:14px;display:flex;gap:16px;flex-wrap:wrap}main{padding:22px;max-width:1660px;margin:0 auto}.headline{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}.headline h2{margin:0 0 10px;font-size:18px;color:var(--accent)}.changes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.change{background:var(--soft-blue);border:1px solid #c7d8ea;border-radius:12px;padding:10px;font-size:13px;line-height:1.4}.change b{display:block;color:var(--accent);margin-bottom:4px}.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}input,select{font:inherit;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}input{min-width:280px;flex:1}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:0 1px 3px rgba(16,42,67,.06)}.card h2{font-size:18px;margin:0 0 5px}.sub{font-size:12px;color:var(--muted);line-height:1.35;min-height:34px}.pills{margin:10px 0}.pill{display:inline-block;border-radius:999px;padding:4px 8px;margin:2px 3px 2px 0;font-size:11px;background:#edf2f7;color:#334e68}.priority5{background:var(--soft-red);color:#912018}.priority4{background:var(--soft-amber);color:#93370d}.priority3{background:var(--soft-green);color:#05603a}.article{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.article h3{font-size:14px;margin:0 0 7px;line-height:1.38}.meta{font-size:11px;color:var(--muted);margin-bottom:7px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.article p{font-size:13px;line-height:1.48;margin:7px 0}.label{font-weight:700;color:#344054}.tagNew{display:inline-block;background:var(--soft-red);color:var(--red);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;margin-right:4px}.tagImp{display:inline-block;background:var(--soft-amber);color:var(--amber);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;margin-right:4px}.linkBtn{display:inline-block;border:1px solid #b9d0ea;background:#f4f9ff;border-radius:8px;padding:4px 8px;font-size:11px;color:#0b63ce;text-decoration:none}.linkMissing{color:#667085;border-color:#d0d5dd;background:#f8fafc}details{border-top:1px solid var(--line);margin-top:10px;padding-top:8px}summary{cursor:pointer;color:var(--accent);font-weight:700;font-size:13px}details p{font-size:13px;line-height:1.45}.empty{grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)}@media(max-width:1300px){.grid,.changes{grid-template-columns:repeat(3,1fr)}}@media(max-width:950px){.grid,.changes{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){main{padding:14px}.grid,.changes{grid-template-columns:1fr}input{min-width:100%}}
</style>
</head>
<body>
<header><h1>E&A BD Daily Dashboard</h1><div class="timebar"><span id="today"></span><span id="briefingTime"></span><span id="lastUpdated"></span></div></header>
<main>
<section class="headline"><h2>오늘 변경사항</h2><div id="changes" class="changes"></div></section>
<section class="topbar"><input id="q" placeholder="검색: QE Urea, SAN VI, INPEX, ACME, APOC, 기사 제목..."><select id="region"><option value="">전체 지역</option></select><select id="priority"><option value="">전체 중요도</option><option value="5">★★★★★</option><option value="4">★★★★☆</option><option value="3">★★★☆☆</option></select></section>
<section id="cards" class="grid"></section>
</main>
<script>
const data=[{"agenda":"QE Urea","fullName":"QatarEnergy Urea / Ammonia Expansion","region":"Qatar","status":"Bid Watch","priority":4,"owner":"QatarEnergy","ownerWatch":"Mesaieed urea/ammonia 증설 관련 bid 일정, commercial clarification, licensor 조합, low-carbon 인증 조건 추적.","competitorWatch":"Samsung E&A+Thyssenkrupp+CCC, Tecnimont+L&T, Hyundai E&C+CTCI+Toyo, Saipem 등 경쟁 조합 확인 필요.","implication":"기술 라이선서 조합과 QatarEnergy의 HSE/실행 신뢰성이 핵심.","articles":[{"title":"QatarEnergy Urea expansion tender remains a key bid watch item","source":"Project Watch","date":"Update needed","url":"","summary":"QatarEnergy의 urea/ammonia 증설 안건은 입찰 일정, licensor 조합, commercial bid 일정이 핵심 변수로 관리되어야 한다.","insight":"E&A 관점에서는 기술사 조합과 QatarEnergy의 실행 신뢰성 평가가 수주 경쟁력을 좌우할 가능성이 높다.","isNew":true,"isImportant":true}]},{"agenda":"Saudi SAN VI","fullName":"SABIC Agri-Nutrients SAN VI / Blue Ammonia","region":"Saudi Arabia","status":"FID / EPC Award Watch","priority":5,"owner":"SABIC Agri-Nutrients","ownerWatch":"gas allocation, FID, EPC award, blue ammonia scope, offtake 및 CO2 처리 범위 추적.","competitorWatch":"L&T, JGC 등 Saudi ammonia/gas execution 경험 보유 EPC와 가격/납기 경쟁 확인.","implication":"FID와 EPC award 공시가 핵심 트리거.","articles":[{"title":"SAN VI remains in FID and EPC award watch stage","source":"Project Watch","date":"Update needed","url":"","summary":"SAN VI는 FID 및 EPC award 발표 전 단계로 관리하며, scope 조정, gas allocation, offtake 신호를 확인해야 한다.","insight":"scope가 blue ammonia 중심으로 재정의될 경우 EPC 금액과 경쟁 구도가 달라질 수 있다.","isNew":true,"isImportant":true}]},{"agenda":"India ACME","fullName":"ACME-IHI Odisha Green Ammonia","region":"India","status":"Funding / EPC Watch","priority":4,"owner":"ACME / IHI","ownerWatch":"일본향 offtake, CfD/가격지원, Gopalpur/Paradip green ammonia 개발 및 수출 인프라 추적.","competitorWatch":"L&T, 일본 상사/기술사, electrolyzer 공급사, ammonia storage/export EPC 경쟁 구도 확인.","implication":"price support 확보 시 bankability가 개선되어 EPC package 구체화 가능성 상승.","articles":[{"title":"ACME-IHI green ammonia receives Japan-linked support signal","source":"International News Watch","date":"2026-07","url":"","summary":"ACME-IHI의 Odisha green ammonia는 일본 수요와 가격지원 구조에 연계되며 상업화 가능성이 높아지는 흐름으로 관찰된다.","insight":"장기 offtake가 확인될수록 EPC package가 구체화될 가능성이 높다.","isNew":true,"isImportant":true}]},{"agenda":"Australia INPEX","fullName":"INPEX Australia Opportunity","region":"Australia","status":"Owner / LNG Watch","priority":4,"owner":"INPEX","ownerWatch":"Ichthys LNG, upstream gas, CCS, decarbonization, brownfield modification 및 후속 capex 동향 추적.","competitorWatch":"JGC, Chiyoda, Technip, Saipem, Wood, Worley 등 LNG/brownfield EPC 및 engineering player 확인.","implication":"LNG brownfield, decarbonization, CCS 관련 후속 안건 신호가 중요.","articles":[{"title":"INPEX Australia watch added for LNG and decarbonization opportunities","source":"Owner Watch","date":"New watch item","url":"","summary":"호주 INPEX 안건은 LNG 운영, brownfield modification, 탈탄소, CCS 후속 투자 관점에서 추적한다.","insight":"기존 LNG 자산의 개조·탈탄소·CCS 연계 투자가 먼저 발주될 가능성이 있다.","isNew":true,"isImportant":true}]},{"agenda":"Indonesia INPEX","fullName":"INPEX Indonesia Opportunity","region":"Indonesia","status":"Owner / Gas Watch","priority":4,"owner":"INPEX","ownerWatch":"Abadi/Masela LNG 등 인도네시아 gas/LNG 개발, PSC, government approval, FEED/EPC 일정 추적.","competitorWatch":"JGC, Chiyoda, Technip, Saipem, McDermott, local Indonesian contractors 확인.","implication":"정부 승인·개발계획·FEED/EPC 재개 신호가 핵심.","articles":[{"title":"INPEX Indonesia watch added for gas and LNG development signals","source":"Owner Watch","date":"New watch item","url":"","summary":"인도네시아 INPEX 안건은 gas/LNG 개발, 정부 승인, FEED/EPC 일정 관점에서 추적한다.","insight":"정부 승인과 개발계획 확정이 EPC 전환의 선행지표가 될 수 있다.","isNew":true,"isImportant":true}]},{"agenda":"Kazakhstan PCOR Refinery","fullName":"PCOR Refinery Opportunity","region":"Kazakhstan","status":"FEED / EPC Watch","priority":3,"owner":"PCOR / Kazakhstan stakeholders","ownerWatch":"정유 고도화, 투자 승인, FEED/EPC 전환, 현지 파트너 및 정부 승인 동향 추적.","competitorWatch":"중국 EPC, Technip, Saipem, 지역 contractor 및 금융 연계 player 확인.","implication":"financing, sanction, feedstock/offtake, 현지화 조건이 핵심 리스크.","articles":[{"title":"PCOR refinery watch requires financing and owner approval check","source":"Project Watch","date":"Update needed","url":"","summary":"PCOR 정유 안건은 발주처 승인, 금융조달, FEED/EPC 전환 신호를 중심으로 확인이 필요하다.","insight":"정부 및 금융기관 뉴스가 중요하다.","isNew":false,"isImportant":false}]},{"agenda":"Aramco Tanajib","fullName":"Saudi Aramco Tanajib Opportunity","region":"Saudi Arabia","status":"Bid / Owner Watch","priority":4,"owner":"Saudi Aramco","ownerWatch":"Tanajib 지역 oil/gas processing, expansion, utilities, pipeline, offshore/onshore interface 발주 동향 추적.","competitorWatch":"L&T, Saipem, Technip, JGC, Hyundai, McDermott 등 Saudi execution 강자 확인.","implication":"Aramco qualification, IKTVA, delivery certainty가 핵심.","articles":[{"title":"Tanajib watch focuses on package scope and tender movement","source":"Project Watch","date":"Update needed","url":"","summary":"Tanajib 관련 세부 package, tender status, 경쟁사 참여 여부를 지속 확인해야 한다.","insight":"초청사 명단과 패키지 분할 여부가 가장 중요한 정보다.","isNew":false,"isImportant":true}]},{"agenda":"HUGRS II","fullName":"HUGRS II","region":"Saudi Arabia","status":"Bid Watch","priority":4,"owner":"Saudi Aramco / related owner","ownerWatch":"HUGRS II 발주 일정, gas recovery/sulfur/utilities scope, FEED/EPC 단계 변화 추적.","competitorWatch":"Aramco gas processing 경험 보유 EPC 및 Saudi 로컬 파트너 동향 확인.","implication":"scope split과 licensor/interface가 수주 전략의 핵심.","articles":[{"title":"HUGRS II bid watch: scope and package confirmation required","source":"Project Watch","date":"Update needed","url":"","summary":"HUGRS II의 공개 기사, 입찰 일정, 경쟁 구도 확인이 필요하다.","insight":"FEED 산출물과 패키지 경계가 명확해질수록 수주 전략 수립이 가능하다.","isNew":false,"isImportant":true}]},{"agenda":"Mexico Ursus FEED","fullName":"Ursus FEED","region":"Mexico","status":"FEED Watch","priority":4,"owner":"Ursus project owner","ownerWatch":"FEED 진행률, FID, financing, permits, offtake, EPC 전환 가능성 추적.","competitorWatch":"FEED contractor, EPC 전환 후보, local contractor 및 financing partner 확인.","implication":"FEED-to-EPC 전환 여부가 핵심.","articles":[{"title":"Ursus FEED: monitor FEED progress and EPC conversion signals","source":"Project Watch","date":"Update needed","url":"","summary":"멕시코 Ursus FEED 안건은 FEED 진행 상황과 EPC 전환 가능성 중심으로 추적한다.","insight":"FID, offtake, financing, permits가 EPC 전환의 핵심 조건이다.","isNew":false,"isImportant":true}]},{"agenda":"Jordan JPRC Expansion","fullName":"JPRC Expansion","region":"Jordan","status":"Expansion Watch","priority":3,"owner":"Jordan Petroleum Refinery Company","ownerWatch":"정유공장 확장, financing, 정부 승인, FEED/EPC 일정, 환경/연료품질 규제 추적.","competitorWatch":"정유 고도화 EPC 경험사, licensor, financing-linked contractor 확인.","implication":"financing/정부 승인/연료 수요 전망이 중요.","articles":[{"title":"JPRC expansion watch: financing and tender schedule remain key","source":"Project Watch","date":"Update needed","url":"","summary":"JPRC Expansion은 financing 및 tender schedule 확정 여부가 핵심이다.","insight":"EPC 입찰보다 financing structure 확정이 먼저 확인되어야 한다.","isNew":false,"isImportant":false}]},{"agenda":"Saudi APOC","fullName":"Completed Project / Owner Watch","region":"Saudi Arabia","status":"Completed / Owner Watch","priority":3,"owner":"APOC","ownerWatch":"수행 완료 프로젝트. 발주처의 후속 투자, refinery/petrochemical/green fuel/hydrogen 신규 발주 가능성 추적.","competitorWatch":"후속 EPC, O&M, debottlenecking, revamp contractor 동향 확인.","implication":"관계 유지 및 후속 발주 조기 포착 목적.","articles":[{"title":"APOC owner watch: follow-on investment and new capex signals","source":"Owner Watch","date":"Ongoing","url":"","summary":"APOC 자체 수행은 완료됐으나 발주처의 신규 투자, 증설, revamp 동향은 계속 추적한다.","insight":"기존 수행 실적을 기반으로 add-on 또는 신규 안건 진입 가능성이 있다.","isNew":false,"isImportant":false}]}];
function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n)}function formatDate(){const now=new Date();const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const yyyy=now.getFullYear();const mm=String(now.getMonth()+1).padStart(2,'0');const dd=String(now.getDate()).padStart(2,'0');const hh=String(now.getHours()).padStart(2,'0');const min=String(now.getMinutes()).padStart(2,'0');today.textContent=`${yyyy}.${mm}.${dd} (${days[now.getDay()]})`;lastUpdated.textContent=`Last Updated: ${hh}:${min}`;briefingTime.textContent=now.getHours()<12?'Briefing: AM':'Briefing: PM'}function validUrl(u){return u&&/^https?:\/\//i.test(u)}function linkHtml(u){return validUrl(u)?`<a class="linkBtn" href="${u}" target="_blank" rel="noopener noreferrer">원문 링크</a>`:`<span class="linkBtn linkMissing">링크 미등록</span>`}function fillFilters(){const regions=[...new Set(data.map(x=>x.region))].sort();region.innerHTML='<option value="">전체 지역</option>'+regions.map(r=>`<option value="${r}">${r}</option>`).join('')}function renderChanges(){const changes=data.flatMap(x=>(x.articles||[]).filter(a=>a.isNew).map(a=>({agenda:x.agenda,title:a.title,insight:a.insight}))).slice(0,4);document.getElementById('changes').innerHTML=changes.length?changes.map(c=>`<div class="change"><b>${c.agenda}</b>${c.title}<br><span style="color:#667085">${c.insight}</span></div>`).join(''):'<div class="change"><b>변경사항 없음</b>오늘 NEW 표시된 기사/안건이 없습니다.</div>'}function render(){const query=q.value.toLowerCase();const r=region.value;const p=priority.value;const filtered=data.filter(x=>{const text=JSON.stringify(x).toLowerCase();return(!query||text.includes(query))&&(!r||x.region===r)&&(!p||String(x.priority)===p)});renderChanges();cards.innerHTML=filtered.length?filtered.map(x=>`<article class="card"><h2>${x.agenda}</h2><div class="sub">${x.fullName}</div><div class="pills"><span class="pill">${x.region}</span><span class="pill">${x.status}</span><span class="pill priority${x.priority}">${stars(x.priority)}</span></div>${(x.articles||[]).slice(0,3).map(a=>`<div class="article"><h3>${a.isNew?'<span class="tagNew">NEW</span>':''}${a.isImportant?'<span class="tagImp">중요</span>':''}${a.title}</h3><div class="meta"><span>${a.date}</span><span>·</span><span>${a.source}</span>${linkHtml(a.url)}</div><p><span class="label">기사요약:</span> ${a.summary}</p><p><span class="label">인사이트:</span> ${a.insight}</p></div>`).join('')}<details><summary>Owner Watch</summary><p>${x.ownerWatch}</p></details><details><summary>Competitor Watch</summary><p>${x.competitorWatch}</p></details><details><summary>E&A 시사점</summary><p>${x.implication}</p></details></article>`).join(''):`<div class="empty">검색 결과가 없습니다.</div>`}
q.addEventListener('input',render);region.addEventListener('change',render);priority.addEventListener('change',render);formatDate();fillFilters();render();setInterval(formatDate,30000);
</script>
</body>
</html>
